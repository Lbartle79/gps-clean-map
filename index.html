<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Full Investigator Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; font-size:18px;}

#topbar {
  padding:10px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

#map {
  height:55vh;
  margin-top:60px;
}

#timeline {
  height:45vh;
  overflow-y:auto;
  background:#111;
}

.item {
  padding:14px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover {
  background:#222;
}

button {
  margin-left:10px;
  padding:5px 10px;
}
</style>
</head>

<body>

<div id="topbar">
  Select Day:
  <select id="daySelect"></select>
  <button onclick="playRoute()">▶ Play</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-105],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

let allPoints = {};
let markers = [];
let lines = [];
let playbackMarker = null;

// COLORS FOR DAYS
let colors = ["red","cyan","yellow","lime","orange","magenta","white"];
let colorIndex = 0;

// LOAD KML
fetch("2025_MASTER_FullTrace.kml")
.then(res => res.text())
.then(kmlText => {

  let parser = new DOMParser();
  let xml = parser.parseFromString(kmlText, "text/xml");
  let placemarks = xml.getElementsByTagName("Placemark");

  for (let i = 0; i < placemarks.length; i++) {

    let desc = placemarks[i].getElementsByTagName("description")[0]?.textContent || "";
    let coords = placemarks[i].getElementsByTagName("coordinates");

    if (coords.length === 0) continue;

    let parts = coords[0].textContent.trim().split(",");
    let lat = parseFloat(parts[1]);
    let lon = parseFloat(parts[0]);

    let match = desc.match(/Start:\s*(\d{4}-\d{2}-\d{2})/);
    if (!match) continue;

    let date = match[1];

    if (!allPoints[date]) {
      allPoints[date] = {
        points: [],
        color: colors[colorIndex % colors.length]
      };
      colorIndex++;
    }

    allPoints[date].points.push({lat, lon, desc});
  }

  drawAllDays();
  buildDropdown();

});

function drawAllDays(){

  Object.keys(allPoints).forEach(day => {

    let pts = allPoints[day].points;
    let latlngs = pts.map(p => [p.lat, p.lon]);

    // faint line
    let line = L.polyline(latlngs, {
      color: allPoints[day].color,
      weight:2,
      opacity:0.3
    }).addTo(map);

    lines.push(line);

    // breadcrumb dots
    latlngs.forEach(p => {
      L.circleMarker(p, {
        radius:2,
        color:allPoints[day].color,
        opacity:0.3
      }).addTo(map);
    });

  });

}

function buildDropdown(){

  let select = document.getElementById("daySelect");
  let days = Object.keys(allPoints).sort();

  days.forEach(day => {
    let opt = document.createElement("option");
    opt.value = day;
    opt.text = day;
    select.appendChild(opt);
  });
