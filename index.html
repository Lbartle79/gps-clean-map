<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Investigator Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; }
#map { height:100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>

let map = L.map('map').setView([53,-105],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19
}).addTo(map);

fetch("2025_MASTER_FullTrace.kml")
.then(res => res.text())
.then(kmlText => {

    let parser = new DOMParser();
    let xml = parser.parseFromString(kmlText, "text/xml");

    let placemarks = xml.getElementsByTagName("Placemark");

    let latlngs = [];

    for (let i = 0; i < placemarks.length; i++) {

        let coords = placemarks[i].getElementsByTagName("coordinates");

        if (coords.length > 0) {

            let raw = coords[0].textContent.trim().split(" ");

            raw.forEach(c => {
                let parts = c.split(",");
                if (parts.length >= 2) {
                    let lat = parseFloat(parts[1]);
                    let lon = parseFloat(parts[0]);

                    latlngs.push([lat, lon]);

                    L.circleMarker([lat, lon], {
                        radius: 3,
                        color: "cyan"
                    }).addTo(map);
                }
            });
        }
    }

    if (latlngs.length > 0) {
        let line = L.polyline(latlngs, { color: "cyan" }).addTo(map);
        map.fitBounds(line.getBounds());
    }

});

</script>

</body>
</html>
