<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Clean Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#topbar{padding:10px;background:#222;color:white;}
#map{height:60vh;}
#timeline{height:40vh;overflow-y:auto;padding:10px;}
.item{padding:8px;border-bottom:1px solid #ddd;cursor:pointer;}
</style>
</head>

<body>

<div id="topbar">
Select Day:
<select id="daySelect"></select>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let STOP_DISTANCE = 50;
let STOP_TIME = 10;

let map = L.map('map').setView([53,-106],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let routeLine;
let markers=[];

function haversine(a,b,c,d){
let R=6371000;
let toRad=x=>x*Math.PI/180;
let dLat=toRad(c-a);
let dLon=toRad(d-b);
let x=Math.sin(dLat/2)**2+
Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;
return 2*R*Math.asin(Math.sqrt(x));
}

function clearMap(){
markers.forEach(m=>map.removeLayer(m));
markers=[];
if(routeLine) map.removeLayer(routeLine);
}

function clean(points){
let out=[];
let last=null;

points.forEach(p=>{
if(!last){
out.push(p);
last=p;
return;
}

let d=haversine(last.lat,last.lon,p.lat,p.lon);
if(d>10){
out.push(p);
last=p;
}
});

return out;
}

function getStops(points){
let stops=[];

for(let i=1;i<points.length;i++){
let d=haversine(
points[i-1].lat,points[i-1].lon,
points[i].lat,points[i].lon
);

let t=(points[i].time-points[i-1].time)/60000;

if(d<STOP_DISTANCE && t>=STOP_TIME){
stops.push(points[i]);
}
}

return stops;
}

function draw(points){

clearMap();

points=clean(points);

let latlngs=points.map(p=>[p.lat,p.lon]);

routeLine=L.polyline(latlngs,{color:'blue'}).addTo(map);

map.fitBounds(routeLine.getBounds());

let stops=getStops(points);

stops.forEach(s=>{
let m=L.circleMarker([s.lat,s.lon],{
radius:7,color:'red'
}).addTo(map);

m.bindPopup(new Date(s.time).toLocaleString());

markers.push(m);
});

buildTimeline(stops);
}

function buildTimeline(stops){

let div=document.getElementById("timeline");
div.innerHTML="";

stops.forEach(s=>{
let item=document.createElement("div");
item.className="item";

item.innerHTML=new Date(s.time).toLocaleString()+" — Stop";

item.onclick=()=>{
map.setView([s.lat,s.lon],15);
};

div.appendChild(item);
});
}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

let days={};

data.forEach(p=>{
let d=new Date(p.timestamp);
let day=d.toISOString().split("T")[0];

if(!days[day]) days[day]=[];

days[day].push({
lat:p.lat,
lon:p.lon,
time:d.getTime()
});
});

let select=document.getElementById("daySelect");

Object.keys(days).sort().forEach(day=>{
let o=document.createElement("option");
o.value=day;
o.text=day;
select.appendChild(o);
});

select.onchange=()=>{
draw(days[select.value]);
};

draw(days[select.value]);

});

</script>

</body>
</html>
