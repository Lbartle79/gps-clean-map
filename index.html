<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Clean Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#topbar{padding:10px;background:#222;color:white;}
#map{height:60vh;}
#timeline{height:40vh;overflow-y:auto;padding:10px;}
.item{padding:8px;border-bottom:1px solid #ddd;cursor:pointer;}
</style>
</head>

<body>

<div id="topbar">
Select Day:
<select id="daySelect"></select>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-106],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let routeLine;
let markers=[];

function clearMap(){
markers.forEach(m=>map.removeLayer(m));
markers=[];
if(routeLine) map.removeLayer(routeLine);
}

function parseGeo(str){
if(!str) return null;
let parts=str.replace("geo:","").split(",");
return {
lat:parseFloat(parts[0]),
lon:parseFloat(parts[1])
};
}

function draw(points){

clearMap();

let latlngs=points.map(p=>[p.lat,p.lon]);

routeLine=L.polyline(latlngs,{color:'blue'}).addTo(map);

map.fitBounds(routeLine.getBounds());

points.forEach(p=>{
let m=L.circleMarker([p.lat,p.lon],{
radius:4,color:'red'
}).addTo(map);

markers.push(m);
});

buildTimeline(points);
}

function buildTimeline(points){

let div=document.getElementById("timeline");
div.innerHTML="";

points.forEach(p=>{
let item=document.createElement("div");
item.className="item";

item.innerHTML=new Date(p.time).toLocaleString();

item.onclick=()=>{
map.setView([p.lat,p.lon],15);
};

div.appendChild(item);
});
}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

let days={};

data.forEach(item=>{

let coord=null;
let time=null;

// ✅ activity
if(item.activity){
coord=parseGeo(item.activity.start);
time=new Date(item.startTime);
}

// ✅ visit
if(item.visit){
coord=parseGeo(item.visit.topCandidate.placeLocation);
time=new Date(item.startTime);
}

if(!coord || !time) return;

let day=time.toISOString().split("T")[0];

if(!days[day]) days[day]=[];

days[day].push({
lat:coord.lat,
lon:coord.lon,
time:time
});

});

// ✅ sort properly
Object.keys(days).forEach(day=>{
days[day].sort((a,b)=>a.time-b.time);
});

let select=document.getElementById("daySelect");

Object.keys(days).sort().forEach(day=>{
let o=document.createElement("option");
o.value=day;
o.text=day;
select.appendChild(o);
});

select.onchange=()=>{
draw(days[select.value]);
};

draw(days[select.value]);

});

</script>

</body>
</html>
