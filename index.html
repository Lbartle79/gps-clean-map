<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Investigator Map FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; font-size:18px;}

#topbar {
  padding:10px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

#map {
  height:55vh;
  margin-top:60px;
}

#timeline {
  height:45vh;
  overflow-y:auto;
  background:#111;
}

.item {
  padding:14px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover {
  background:#222;
}

button {
  margin-left:10px;
  padding:5px 10px;
}
</style>
</head>

<body>

<div id="topbar">
  Select Day:
  <select id="daySelect"></select>
  <button onclick="playRoute()">▶ Play</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-105],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

let allPoints = {};
let markers = [];
let playbackMarker = null;

let colors = ["red","cyan","yellow","lime","orange","magenta","white"];
let colorIndex = 0;

// LOAD KML
fetch("2025_MASTER_FullTrace.kml")
.then(res => res.text())
.then(kmlText => {

  let parser = new DOMParser();
  let xml = parser.parseFromString(kmlText, "text/xml");
  let placemarks = xml.getElementsByTagName("Placemark");

  for (let i = 0; i < placemarks.length; i++) {

    let desc = placemarks[i].getElementsByTagName("description")[0]?.textContent || "";
    let coords = placemarks[i].getElementsByTagName("coordinates");

    if (coords.length === 0) continue;

    let rawCoords = coords[0].textContent.trim().split(" ");

    rawCoords.forEach(c => {

      let parts = c.split(",");
      if(parts.length < 2) return;

      let lat = parseFloat(parts[1]);
      let lon = parseFloat(parts[0]);

      let match = desc.match(/Start:\s*(\d{4}-\d{2}-\d{2})/);
      if (!match) return;

      let date = match[1];

      if (!allPoints[date]) {
        allPoints[date] = {
          points: [],
          color: colors[colorIndex % colors.length]
        };
        colorIndex++;
      }

      allPoints[date].points.push({lat, lon, desc});
    });
  }

  drawAllDays();
  buildDropdown();

});

// DRAW ALL DAYS (faint)
function drawAllDays(){

  Object.keys(allPoints).forEach(day => {

    let pts = allPoints[day].points;
    let latlngs = pts.map(p => [p.lat, p.lon]);

    L.polyline(latlngs, {
      color: allPoints[day].color,
      weight:2,
      opacity:0.2
    }).addTo(map);

  });
}

// DROPDOWN
function buildDropdown(){

  let select = document.getElementById("daySelect");
  let days = Object.keys(allPoints).sort();

  days.forEach(day => {
    let opt = document.createElement("option");
    opt.value = day;
    opt.text = day;
    select.appendChild(opt);
  });

  select.onchange = () => loadDay(select.value);

  let firstDay = days[0];
  select.value = firstDay;
  loadDay(firstDay);
}

// CLEAR
function clearDay(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// LOAD DAY
function loadDay(day){

  clearDay();

  let timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  let pts = allPoints[day].points;
  let latlngs = [];

  pts.forEach((p, i) => {

    latlngs.push([p.lat, p.lon]);

    let marker = L.marker([p.lat, p.lon], {
      icon: L.divIcon({
        html: `<div style="background:red;color:white;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;">${i+1}</div>`
      })
    }).addTo(map);

    markers.push(marker);

    // CLEAN TEXT
    let start = p.desc.match(/Start:\s*([^\n]+)/)?.[1] || "";
    let end = p.desc.match(/End:\s*([^\n]+)/)?.[1] || "";

    let cleanText = `
      <b>Stop ${i+1}</b><br>
      ${start}<br>
      ${end}
    `;

    marker.bindPopup(cleanText);

    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = cleanText;

    div.onclick = () => {
      map.setView([p.lat, p.lon], 16);
      marker.openPopup();
    };

    timeline.appendChild(div);

  });

  if(latlngs.length > 1){
    L.polyline(latlngs, {
      color: allPoints[day].color,
      weight:5
    }).addTo(map);
  } else if(latlngs.length === 1){
    map.setView(latlngs[0], 14);
  }
}

// PLAYBACK
function playRoute(){

  let day = document.getElementById("daySelect").value;
  let pts = allPoints[day].points;

  let i = 0;

  if(playbackMarker) map.removeLayer(playbackMarker);

  let interval = setInterval(() => {

    if(i >= pts.length){
      clearInterval(interval);
      return;
    }

    let p = pts[i];

    if(playbackMarker) map.removeLayer(playbackMarker);

    playbackMarker = L.circleMarker([p.lat, p.lon], {
      radius:10,
      color:"white"
    }).addTo(map);

    map.setView([p.lat, p.lon], 15);

    i++;

  }, 700);

}

</script>

</body>
</html>
