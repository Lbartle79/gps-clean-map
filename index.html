<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Investigator Map (Clickable Stops)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; }

#topbar {
  padding:10px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

#map {
  height:60vh;
  margin-top:50px;
}

#timeline {
  height:40vh;
  overflow-y:auto;
  background:#111;
}

.item {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover {
  background:#222;
}
</style>
</head>

<body>

<div id="topbar">
  Investigator Map — Click Stops Below
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-105],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19
}).addTo(map);

fetch("2025_MASTER_FullTrace.kml")
.then(res => res.text())
.then(kmlText => {

    let parser = new DOMParser();
    let xml = parser.parseFromString(kmlText, "text/xml");

    let placemarks = xml.getElementsByTagName("Placemark");

    let latlngs = [];
    let timeline = document.getElementById("timeline");

    for (let i = 0; i < placemarks.length; i++) {

        let name = placemarks[i].getElementsByTagName("name")[0]?.textContent || "Stop";
        let desc = placemarks[i].getElementsByTagName("description")[0]?.textContent || "";

        let coords = placemarks[i].getElementsByTagName("coordinates");

        if (coords.length > 0) {

            let parts = coords[0].textContent.trim().split(",");
            let lat = parseFloat(parts[1]);
            let lon = parseFloat(parts[0]);

            let marker = L.circleMarker([lat, lon], {
                radius: 6,
                color: "cyan"
            }).addTo(map);

            marker.bindPopup(`<b>${name}</b><br>${desc}`);

            latlngs.push([lat, lon]);

            // TIMELINE ITEM
            let div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `<b>${name}</b><br>${desc}`;

            div.onclick = () => {
                map.setView([lat, lon], 14);
                marker.openPopup();
            };

            timeline.appendChild(div);
        }
    }

    if (latlngs.length > 0) {
        let line = L.polyline(latlngs, { color: "cyan" }).addTo(map);
        map.fitBounds(line.getBounds());
    }

});

</script>

</body>
</html>
