<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Investigator Map FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; font-size:18px;}

#topbar {
  padding:10px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

#map {
  height:55vh;
  margin-top:60px;
}

#timeline {
  height:45vh;
  overflow-y:auto;
  background:#111;
}

.item {
  padding:14px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.item:hover {
  background:#222;
}

button {
  margin-left:10px;
  padding:5px 10px;
}
</style>
</head>

<body>

<div id="topbar">
  Select Day:
  <select id="daySelect"></select>
  <button onclick="playRoute()">▶ Play</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-105],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

let allDays = {};
let markers = [];
let playbackMarker = null;

let colors = ["red","cyan","yellow","lime","orange","magenta","white"];
let colorIndex = 0;

// LOAD KML
fetch("2025_MASTER_FullTrace.kml")
.then(res => res.text())
.then(kmlText => {

  let parser = new DOMParser();
  let xml = parser.parseFromString(kmlText, "text/xml");

  let placemarks = xml.getElementsByTagName("Placemark");

  for (let i = 0; i < placemarks.length; i++) {

    let desc = placemarks[i].getElementsByTagName("description")[0]?.textContent || "";

    let dateMatch = desc.match(/Start:\s*(\d{4}-\d{2}-\d{2})/);
    if (!dateMatch) continue;

    let date = dateMatch[1];

    if (!allDays[date]) {
      allDays[date] = {
        stops: [],
        lines: [],
        color: colors[colorIndex % colors.length]
      };
      colorIndex++;
    }

    // POINT (STOP)
    let point = placemarks[i].getElementsByTagName("Point");
    if (point.length > 0) {

      let coords = point[0].getElementsByTagName("coordinates")[0].textContent.trim();
      let parts = coords.split(",");

      let lat = parseFloat(parts[1]);
      let lon = parseFloat(parts[0]);

      allDays[date].stops.push({lat, lon, desc});
    }

    // LINESTRING (MOVEMENT / BREADCRUMBS)
    let line = placemarks[i].getElementsByTagName("LineString");
    if (line.length > 0) {

      let coords = line[0].getElementsByTagName("coordinates")[0].textContent.trim().split(" ");

      let latlngs = [];

      coords.forEach(c => {
        let parts = c.split(",");
        if(parts.length < 2) return;

        latlngs.push([parseFloat(parts[1]), parseFloat(parts[0])]);
      });

      allDays[date].lines.push(latlngs);
    }

  }

  drawAllDays();
  buildDropdown();

});

// DRAW BACKGROUND (ALL DAYS FAINT)
function drawAllDays(){

  Object.keys(allDays).forEach(day => {

    allDays[day].lines.forEach(line => {
      L.polyline(line, {
        color: allDays[day].color,
        weight:2,
        opacity:0.2
      }).addTo(map);
    });

  });
}

// DROPDOWN
function buildDropdown(){

  let select = document.getElementById("daySelect");
  let days = Object.keys(allDays).sort();

  days.forEach(day => {
    let opt = document.createElement("option");
    opt.value = day;
    opt.text = day;
    select.appendChild(opt);
  });

  select.onchange = () => loadDay(select.value);

  loadDay(days[0]);
}

// CLEAR
function clearDay(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// LOAD DAY
function loadDay(day){

  clearDay();

  let timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  let data = allDays[day];

  // DRAW PATHS (BREADCRUMBS)
  data.lines.forEach(line => {
    L.polyline(line, {
      color: data.color,
      weight:4
    }).addTo(map);
  });

  // DRAW STOPS
  data.stops.forEach((p, i) => {

    let marker = L.marker([p.lat, p.lon], {
      icon: L.divIcon({
        html: `<div style="background:red;color:white;border-radius:50%;width:26px;height:26px;text-align:center;line-height:26px;font-weight:bold;">${i+1}</div>`
      })
    }).addTo(map);

    markers.push(marker);

    let start = p.desc.match(/Start:\s*([^\n]+)/)?.[1] || "";
    let end = p.desc.match(/End:\s*([^\n]+)/)?.[1] || "";

    let text = `<b>Stop ${i+1}</b><br>${start}<br>${end}`;

    marker.bindPopup(text);

    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = text;

    div.onclick = () => {
      map.setView([p.lat, p.lon], 16);
      marker.openPopup();
    };

    timeline.appendChild(div);

  });

}

// PLAYBACK (NOW FOLLOWS PATH)
function playRoute(){

  let day = document.getElementById("daySelect").value;
  let lines = allDays[day].lines.flat();

  let i = 0;

  if(playbackMarker) map.removeLayer(playbackMarker);

  let interval = setInterval(() => {

    if(i >= lines.length){
      clearInterval(interval);
      return;
    }

    let p = lines[i];

    if(playbackMarker) map.removeLayer(playbackMarker);

    playbackMarker = L.circleMarker(p, {
      radius:8,
      color:"white"
    }).addTo(map);

    map.setView(p, 15);

    i++;

  }, 200);

}

</script>



</body>
</html>
